publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_riverpod: ^2.3.6
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.63.0
  intl: ^0.18.1
  uuid: ^3.0.7
  connectivity_plus: ^4.0.1
  google_fonts: ^5.1.0
  animations: ^2.0.7
  flutter_staggered_animations: ^1.0.0
  percent_indicator: ^4.2.3
  path_provider: ^2.0.15

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1
  hive_generator: ^2.0.0
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
